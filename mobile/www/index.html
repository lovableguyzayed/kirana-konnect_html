<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <!-- Allow this shell to redirect to / connect to the hosted backend. -->
        <meta http-equiv="Content-Security-Policy"
              content="default-src 'self' https://*.onrender.com; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src https://*.onrender.com; img-src 'self' data:;" />
        <meta name="format-detection" content="telephone=no" />
        <meta name="msapplication-tap-highlight" content="no" />
        <meta name="viewport"
              content="initial-scale=1, width=device-width, viewport-fit=cover" />
        <link rel="stylesheet" href="css/index.css" />
        <title>Kirana Konnect</title>
    </head>
    <body>
        <div class="splash" id="splash">
            <div class="logo">🛒</div>
            <h1>Kirana Konnect</h1>
            <div class="spinner" id="spinner"></div>
            <p class="status" id="status">Loading…</p>
        </div>

        <div class="offline hidden" id="offline">
            <div class="logo">📡</div>
            <h1>No connection</h1>
            <p>Kirana Konnect needs an internet connection to reach your store data.</p>
            <button id="retry" type="button">Retry</button>
        </div>

        <script src="cordova.js"></script>
        <script src="js/config.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
