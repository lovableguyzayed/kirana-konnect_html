# Render Blueprint: deploys the Flask app AND a free PostgreSQL database.
# Render injects DATABASE_URL from the database into the web service, so you do
# not need Supabase or any external database. Deploy: push to GitHub, then in
# Render click "New +" -> "Blueprint" and pick this repo.
databases:
  - name: kirana-konnect-db
    plan: free

services:
  - type: web
    name: kirana-konnect
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # No --preload: gunicorn binds the port before forking workers, so the
    # service comes up fast for Render's health check even if DB init is slow.
    # (The multi-worker seed race is handled by the startup dedupe instead.)
    startCommand: "gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT"
    envVars:
      # Connection string of the free Postgres database created above.
      # app.py normalizes the postgres:// scheme to postgresql:// automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: kirana-konnect-db
          property: connectionString
      # Random Flask session secret generated by Render.
      - key: SESSION_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
